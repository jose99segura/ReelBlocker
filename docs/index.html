<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Basta! — Reel Blocker</title>
<style>
  :root {
    --bg: #1a1a2e;
    --bg-soft: #fafafa;
    --ink: #1a1a2e;
    --accent: #dc2626;
    --muted: #666;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
         max-width: 640px; margin: 4rem auto; padding: 0 1rem; line-height: 1.55;
         color: var(--ink); background: var(--bg-soft); text-align: center; }
  .logo { width: 96px; height: 96px; background: var(--bg);
          display: inline-flex; align-items: center; justify-content: center;
          border-radius: 22px; margin-bottom: 1.5rem; }
  .logo svg { width: 60%; height: 60%; }
  .wordmark { font-size: 3rem; font-weight: 900; letter-spacing: -0.04em;
              margin: 0; line-height: 1; }
  .wordmark .stop { color: var(--accent); }
  .descriptor { font-size: 0.95rem; letter-spacing: 0.3em; text-transform: uppercase;
                color: var(--muted); margin-top: 0.5rem; }
  .tagline { color: #333; margin-top: 1.5rem; font-size: 1.1rem; max-width: 28ch;
             margin-left: auto; margin-right: auto; }
  .links { margin-top: 2.5rem; }
  .links a { display: inline-block; margin: 0 0.4rem 0.6rem;
             color: #4338ca; text-decoration: none;
             border: 1px solid #c7d2fe; padding: 0.5rem 1rem; border-radius: 8px;
             font-size: 0.95rem; }
  .links a:hover { background: #eef2ff; }
  footer { margin-top: 4rem; color: #888; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="logo">
  <svg viewBox="0 0 108 108" xmlns="http://www.w3.org/2000/svg">
    <!-- Barra del "!" -->
    <path fill="#FFFFFF"
      d="M 49.5 24 L 58.5 24 A 2.5 2.5 0 0 1 61 26.5 L 61 59.5 A 2.5 2.5 0 0 1 58.5 62 L 49.5 62 A 2.5 2.5 0 0 1 47 59.5 L 47 26.5 A 2.5 2.5 0 0 1 49.5 24 Z"/>
    <!-- Punto rojo -->
    <circle cx="54" cy="73" r="7" fill="#DC2626"/>
  </svg>
</div>
<h1 class="wordmark">Basta<span class="stop">!</span></h1>
<div class="descriptor">Reel Blocker</div>
<p class="tagline">Basta! de Reels infinitos. Recupera tu atención.</p>

<div class="links">
  <a href="privacy.html">Política de privacidad</a>
  <a href="https://github.com/jose99segura/ReelBlocker">Código fuente</a>
</div>

<footer>
  &copy; 2026 · Hecha contra el scroll infinito.
</footer>
</body>
</html>
