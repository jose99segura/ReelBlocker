plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

// Carga keystore.properties si existe (no commiteado). Sin este archivo,
// solo se podra hacer build debug. Ver docs/SIGNING.md.
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace 'app.reelblocker'
    compileSdk 35

    defaultConfig {
        applicationId "app.reelblocker"
        minSdk 24
        targetSdk 35
        // Convención: versionCode = versionName sin puntos × 10.
        // 1.0 → 100, 1.1 → 110, 1.1.1 → 111, 1.2 → 120. Deja hueco para
        // hotfixes (e.g. 1.1 → 110, hotfix → 111) sin saltos raros.
        versionCode 130
        versionName "1.3"
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                // Resolver path RELATIVO a la raiz del repo (rootProject),
                // no relativo a app/. Asi keystore.properties puede usar
                // p.ej. "keystore/basta-release.jks" sin sorpresas. Tambien
                // soporta paths absolutos sin problemas.
                def storePath = keystoreProperties['storeFile']
                def storeFileObj = new File(storePath)
                if (!storeFileObj.isAbsolute()) {
                    storeFileObj = rootProject.file(storePath)
                }
                storeFile storeFileObj
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (keystorePropertiesFile.exists()) {
                signingConfig signingConfigs.release
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        compose = true
        buildConfig = true
    }
    composeOptions {
        kotlinCompilerExtensionVersion = '1.5.14'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.activity:activity-compose:1.9.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-compose:2.8.2'

    def composeBom = platform('androidx.compose:compose-bom:2024.06.00')
    implementation composeBom
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.ui:ui-tooling-preview'
    debugImplementation 'androidx.compose.ui:ui-tooling'
    implementation 'androidx.compose.material3:material3'
    implementation 'androidx.compose.material:material-icons-extended'

    implementation 'com.android.billingclient:billing-ktx:7.1.1'

    // Confetti en la evolucion de la mascota (sistema de rachas).
    implementation 'nl.dionsegijn:konfetti-compose:2.0.4'
}
